<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOWUP — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050505;--bg2:#0a0a0a;--card:#0e0e0e;--border:#161616;--border2:#222;--fg:#f5f5f5;--fg2:#ccc;--muted:#888;--dim:#555;--accent:#c9a84c;--accent2:#e0c672;--abg:rgba(201,168,76,.06);--abg2:rgba(201,168,76,.1);--abg3:rgba(201,168,76,.16);--danger:#e74c3c;--success:#2ecc71;--warn:#f39c12;--gg:linear-gradient(135deg,#c9a84c,#e0c672,#c9a84c);--gt:linear-gradient(135deg,#c9a84c 0%,#f0dfa0 50%,#c9a84c 100%)}
html{scroll-behavior:smooth}body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden;line-height:1.6}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
a{color:var(--accent);text-decoration:none}
.gold-text{background:var(--gt);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.container{max-width:1060px;margin:0 auto;padding:0 20px}
.notif-bar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:rgba(201,168,76,.08);border-bottom:1px solid rgba(201,168,76,.12);font-size:12px;color:var(--accent);position:fixed;top:60px;left:0;right:0;z-index:150;backdrop-filter:blur(12px);transform:translateY(-100%);transition:transform .4s ease}
.notif-bar.show{transform:translateY(0)}
.notif-bar .close-notif{margin-left:auto;background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;padding:4px 8px;opacity:.6}
.notif-bar .close-notif:hover{opacity:1}
.notif-action{background:var(--abg2);border:1px solid rgba(201,168,76,.2);color:var(--accent);font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;padding:4px 12px;border-radius:6px;cursor:pointer;transition:all .2s}
.notif-action:hover{background:var(--abg3)}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px;border-bottom:1px solid var(--border);background:rgba(5,5,5,.92);backdrop-filter:blur(16px);position:fixed;top:0;left:0;right:0;z-index:200}
.nl{font-size:16px;font-weight:900;letter-spacing:2.5px}.nl span{color:var(--accent)}
.ntabs{display:flex;gap:2px}
.nt{padding:8px 15px;font-size:11px;font-weight:500;color:var(--dim);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Poppins',sans-serif;transition:all .2s;margin-bottom:-1px}
.nt:hover{color:var(--muted)}.nt.active{color:var(--accent);border-bottom-color:var(--accent)}
.nright{display:flex;align-items:center;gap:8px}
.coin-badge{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--accent);background:var(--abg2);padding:5px 12px;border-radius:8px}
.coin-badge i{font-size:11px}
.nbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:13px;position:relative}
.nbtn:hover{border-color:var(--accent);color:var(--accent)}
.ndot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--danger);border-radius:50%;border:2px solid var(--bg)}
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(5,5,5,.95);backdrop-filter:blur(16px);border-top:1px solid var(--border);z-index:200;padding:4px 0 env(safe-area-inset-bottom,6px)}
.bni{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;background:none;border:none;color:var(--dim);cursor:pointer;font-family:'Poppins',sans-serif;font-size:9px;font-weight:500;transition:color .2s}
.bni.active{color:var(--accent)}.bni i{font-size:17px}
.dash{padding:76px 0 100px}
.dhero{background:linear-gradient(135deg,rgba(201,168,76,.05) 0%,rgba(201,168,76,.012) 100%);border:1px solid rgba(201,168,76,.1);border-radius:18px;padding:28px;margin-bottom:20px;position:relative;overflow:hidden}
.dhero::before{content:'';position:absolute;top:-40%;right:-10%;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.05),transparent 70%);pointer-events:none}
.dht{display:flex;align-items:center;gap:16px;margin-bottom:14px;position:relative;z-index:1}
.avatar-ring{width:58px;height:58px;border-radius:50%;padding:3px;flex-shrink:0}
.avatar-ring.l1{background:linear-gradient(135deg,#444,#2a2a2a)}.avatar-ring.l2{background:linear-gradient(135deg,#6b5428,#4a3a1a)}.avatar-ring.l3{background:linear-gradient(135deg,#8b6f3a,#6b5428)}.avatar-ring.l4{background:linear-gradient(135deg,#a88a30,#8b6f3a)}.avatar-ring.l5{background:var(--gg)}.avatar-ring.l6{background:var(--gg);box-shadow:0 0 14px rgba(201,168,76,.15)}.avatar-ring.l7{background:var(--gg);box-shadow:0 0 20px rgba(201,168,76,.2)}.avatar-ring.l8{background:var(--gg);box-shadow:0 0 28px rgba(201,168,76,.25)}.avatar-ring.l9{background:var(--gg);box-shadow:0 0 36px rgba(201,168,76,.3)}.avatar-ring.l10{background:var(--gg);box-shadow:0 0 44px rgba(201,168,76,.35);animation:pulse-glow 2s ease infinite}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 44px rgba(201,168,76,.35)}50%{box-shadow:0 0 60px rgba(201,168,76,.5)}}
.avatar-inner{width:100%;height:100%;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:var(--accent)}
.dhi{flex:1;min-width:0}.dhlabel{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:1px}
.dhname{font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.xp-row{margin-top:4px}.xp-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-bottom:4px}
.xp-bar{height:6px;background:#0a0a0a;border-radius:3px;overflow:hidden}.xp-fill{height:100%;background:var(--gg);border-radius:3px;transition:width .6s ease}
.dh-coins{display:flex;align-items:center;gap:6px;font-size:16px;font-weight:800;color:var(--accent);background:var(--abg2);padding:7px 16px;border-radius:10px;flex-shrink:0}
.dh-coins i{font-size:12px}
.dh-motiv{display:flex;align-items:center;gap:8px;margin-top:10px;padding:9px 14px;background:var(--abg);border:1px solid rgba(201,168,76,.1);border-radius:10px;font-size:12px;color:var(--accent);position:relative;z-index:1}
.dh-streak{display:flex;align-items:center;gap:8px;margin-top:8px;padding:9px 14px;background:rgba(231,76,60,.05);border:1px solid rgba(231,76,60,.1);border-radius:10px;font-size:12px;color:#d06050;position:relative;z-index:1}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.scard{text-align:center;padding:16px 10px;background:var(--card);border:1px solid var(--border);border-radius:14px;transition:all .3s}
.scard:hover{border-color:var(--border2)}.sv{font-size:22px;font-weight:800;line-height:1;margin-bottom:3px}.sv.gd{color:var(--accent)}
.sl{font-size:9px;color:var(--dim);font-weight:600;letter-spacing:.7px;text-transform:uppercase}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.dgrid .full{grid-column:1/-1}
.sec-title{font-size:12px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px}.sec-title i{color:var(--accent);font-size:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;transition:all .3s}
.card:hover{border-color:var(--border2)}
.gc{border-color:rgba(201,168,76,.06)}.gc:hover{border-color:rgba(201,168,76,.15);box-shadow:0 0 24px rgba(201,168,76,.03)}
.routine-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:14px;transition:all .35s}
.routine-card.complete{border-color:rgba(201,168,76,.2);box-shadow:0 0 30px rgba(201,168,76,.04)}
.rc-header{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--border);position:relative}
.rc-header::after{content:'';position:absolute;bottom:0;left:20px;right:20px;height:1px;background:var(--border)}
.rc-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.rc-icon.morning{background:rgba(232,184,76,.1);color:#e8b84c}
.rc-icon.afternoon{background:rgba(212,168,67,.1);color:#d4a843}
.rc-icon.evening{background:rgba(139,122,64,.1);color:#b0a060}
.rc-info{flex:1}.rc-label{font-size:14px;font-weight:700}.rc-time{font-size:11px;color:var(--dim);margin-top:1px}
.rc-progress{display:flex;align-items:center;gap:8px}
.rc-pbar{width:60px;height:4px;background:#0a0a0a;border-radius:2px;overflow:hidden}.rc-pfill{height:100%;border-radius:2px;transition:width .4s}
.rc-pbar .morning-fill{background:#e8b84c}.rc-pbar .afternoon-fill{background:#d4a843}.rc-pbar .evening-fill{background:#b0a060}
.rc-pct{font-size:10px;font-weight:700;color:var(--dim);min-width:28px;text-align:right}
.rc-complete{color:var(--success);font-size:14px;animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.rc-body{padding:8px 12px}
.task-row{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;transition:background .15s;cursor:pointer}
.task-row:hover{background:rgba(255,255,255,.015)}
.task-check{width:20px;height:20px;border:2px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:9px;color:transparent}
.task-check.done{background:var(--accent);border-color:var(--accent);color:#0a0a0a}
.task-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;background:var(--abg);color:var(--dim);flex-shrink:0}
.task-row.done .task-icon{color:var(--accent)}
.task-label{flex:1;font-size:13px;transition:all .2s}.task-row.done .task-label{color:var(--dim);text-decoration:line-through}
.task-xp{font-size:10px;font-weight:700;color:var(--accent);opacity:.4}
.task-timer-area{width:80px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.timer-btn{padding:4px 10px;font-size:10px;font-weight:600;border-radius:6px;border:1px solid var(--border2);background:none;color:var(--dim);cursor:pointer;font-family:'Poppins',sans-serif;transition:all .2s;white-space:nowrap}
.timer-btn:hover{border-color:var(--accent);color:var(--accent)}
.timer-display{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%}
.timer-text{font-size:13px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:.5px}
.timer-bar{width:100%;height:3px;background:#0a0a0a;border-radius:2px;overflow:hidden}
.timer-fill{height:100%;background:var(--gg);border-radius:2px;transition:width .15s linear}
.timer-done{color:var(--success);font-size:16px;animation:popIn .3s ease}
.day-progress{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:16px}
.dp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dp-label{font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px}.dp-label i{color:var(--accent)}
.dp-count{font-size:11px;color:var(--dim)}
.dp-bar{height:8px;background:#0a0a0a;border-radius:4px;overflow:hidden;margin-bottom:8px}
.dp-fill{height:100%;background:var(--gg);border-radius:4px;transition:width .5s ease}
.dp-bonus{font-size:11px;color:var(--dim);text-align:center}.dp-bonus span{color:var(--accent);font-weight:600}
.prem-card{position:relative;border-radius:16px;overflow:hidden}
.prem-card.locked::after{content:'';position:absolute;inset:0;background:rgba(5,5,5,.8);backdrop-filter:blur(4px);z-index:2;border-radius:16px}
.prem-card.locked .prem-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3}
.prem-cat{margin-bottom:16px}.prem-cat:last-child{margin-bottom:0}
.prem-cat h4{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.prem-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;color:var(--fg2)}
.prem-item i{color:var(--accent);font-size:9px;width:14px;text-align:center}
.diet-meal{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.02)}
.diet-meal:last-child{border-bottom:none}
.diet-time{font-size:11px;font-weight:700;color:var(--accent);min-width:72px;padding-top:1px}
.diet-text{font-size:12px;color:var(--fg2);line-height:1.5}
.wk-row{display:flex;gap:6px;margin-bottom:14px}
.wk-day{flex:1;text-align:center}.wk-bar{height:40px;background:#0a0a0a;border-radius:6px;overflow:hidden;position:relative}
.wk-fill{position:absolute;bottom:0;left:0;right:0;background:var(--gg);border-radius:6px;transition:height .4s}
.wk-lbl{font-size:9px;color:var(--dim);margin-top:4px;font-weight:500}.wk-pct{font-size:9px;color:var(--muted);margin-top:1px}
.badge-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.badge-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:7px;font-size:10px;font-weight:600;background:var(--abg2);color:var(--accent);border:1px solid rgba(201,168,76,.1)}
.badge-pill.locked{background:rgba(255,255,255,.02);color:var(--dim);border-color:var(--border)}
.badge-pill i{font-size:9px}
.msg-card{padding:12px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:rgba(255,255,255,.008)}
.msg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.msg-date{font-size:9px;color:var(--dim)}
.msg-bubble{padding:9px 12px;border-radius:10px;font-size:12px;line-height:1.6;max-width:85%;margin-bottom:5px}
.msg-user{background:var(--abg);color:#bbb;border:1px solid rgba(201,168,76,.06)}
.msg-admin{background:rgba(46,204,113,.04);color:#aaa;border:1px solid rgba(46,204,113,.06);margin-left:auto}
.bc-card{padding:12px 14px;border-radius:10px;margin-bottom:8px;background:rgba(201,168,76,.03);border:1px solid rgba(201,168,76,.06)}
.bc-label{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--accent);text-transform:uppercase;margin-bottom:3px}
.bc-text{font-size:12px;color:#aaa;line-height:1.6}.bc-meta{font-size:9px;color:var(--dim);margin-top:5px}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:10px;background:#25D366;color:#fff;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .25s}
.wa-btn:hover{background:#20bd5a;transform:translateY(-1px)}
.divider{height:1px;background:var(--border);margin:16px 0}
.input{width:100%;background:#0a0a0a;border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--fg);font-family:'Poppins',sans-serif;font-size:13px;transition:border-color .2s;outline:none}
.input:focus{border-color:var(--accent)}.input::placeholder{color:var(--dim)}
textarea.input{resize:vertical;min-height:70px;line-height:1.5}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;padding:13px 26px;border-radius:10px;border:none;cursor:pointer;transition:all .25s;outline:none;white-space:nowrap}
.btn:focus-visible{box-shadow:0 0 0 2px var(--accent)}
.btn-p{background:var(--gg);color:#0a0a0a}.btn-p:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-o{background:none;color:var(--fg2);border:1px solid var(--border2);font-weight:600}.btn-o:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:9px 18px;font-size:12px;border-radius:8px}
.btn-xs{padding:6px 12px;font-size:10px;border-radius:7px}
.btn-wa{background:#25D366;color:#fff;font-weight:700}.btn-wa:hover{background:#20bd5a;transform:translateY(-1px)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;filter:none!important}
.label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.b-pending{background:rgba(243,156,18,.1);color:var(--warn)}.b-replied{background:var(--abg);color:var(--accent)}.b-resolved{background:rgba(46,204,113,.1);color:var(--success)}
.store-cats{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.store-cat{padding:6px 14px;font-size:11px;font-weight:600;border-radius:8px;border:1px solid var(--border);background:none;color:var(--dim);cursor:pointer;font-family:'Poppins',sans-serif;transition:all .2s}
.store-cat.active{background:var(--abg2);border-color:rgba(201,168,76,.2);color:var(--accent)}
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.store-item{padding:0;overflow:hidden;display:flex;flex-direction:column}
.store-img{width:100%;height:130px;object-fit:cover;display:block}
.store-placeholder{width:100%;height:6px;background:var(--border)}
.store-body{padding:14px;flex:1;display:flex;flex-direction:column}
.store-name{font-size:13px;font-weight:700;margin-bottom:3px}
.store-desc{font-size:11px;color:var(--muted);line-height:1.5;flex:1;margin-bottom:8px}
.store-price{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:800;color:var(--accent);margin-bottom:6px}
.store-price i{font-size:10px}
.store-tag{display:inline-block;font-size:9px;font-weight:600;color:var(--dim);background:rgba(255,255,255,.03);padding:2px 7px;border-radius:4px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.store-need{font-size:10px;color:var(--warn);margin-bottom:6px}
.earn-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,.008);border-radius:10px;border:1px solid var(--border);margin-bottom:6px}
.earn-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--abg2);color:var(--accent);flex-shrink:0}
.earn-info{flex:1}.earn-info h4{font-size:12px;font-weight:600}.earn-info p{font-size:10px;color:var(--dim)}
.earn-val{font-size:13px;font-weight:800;color:var(--accent);white-space:nowrap}
.ref-tiers{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.ref-tier{padding:14px 8px;border-radius:11px;text-align:center;border:1px solid var(--border);transition:all .3s}
.ref-tier.earned{border-color:rgba(201,168,76,.25);background:var(--abg)}
.ref-tier .rt-num{font-size:20px;font-weight:800;color:var(--accent);margin-bottom:2px}
.ref-tier .rt-req{font-size:9px;color:var(--dim);margin-bottom:6px}
.ref-tier .rt-reward{font-size:10px;font-weight:600;color:#bbb;line-height:1.4}
.ref-tier.earned .rt-reward{color:var(--accent)}
.ref-link-box{display:flex;gap:6px;margin-bottom:10px}
.ref-link-box input{flex:1;background:#0a0a0a;border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--accent);font-family:'Poppins',sans-serif;font-size:11px;outline:none}
.ref-lb-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.02)}
.ref-lb-row:last-child{border-bottom:none}
.ref-lb-rank{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;background:var(--abg);color:var(--accent);flex-shrink:0}
.ref-lb-name{flex:1;font-size:12px;font-weight:600}
.ref-lb-count{font-size:12px;font-weight:700;color:var(--accent)}
.mentor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.mentor-card{padding:0;overflow:hidden}.mentor-img{width:100%;height:150px;object-fit:cover;display:block}
.mentor-body{padding:16px}.mentor-name{font-size:14px;font-weight:700;margin-bottom:1px}

.mentor-meta span{display:flex;align-items:center;gap:4px}.mentor-meta i{font-size:9px;color:var(--accent)}
.photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.photo-slot{aspect-ratio:3/4;border:2px dashed var(--border2);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.photo-slot:hover{border-color:var(--accent);background:var(--abg)}
.photo-slot i{font-size:20px;color:var(--dim);margin-bottom:4px}
.photo-slot span{font-size:10px;color:var(--dim);font-weight:500}
.photo-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:10px}
.photo-slot .photo-label{position:absolute;bottom:0;left:0;right:0;padding:6px;background:linear-gradient(transparent,rgba(0,0,0,.7));font-size:9px;color:#fff;font-weight:600;text-align:center;border-radius:0 0 10px 10px;z-index:1}
.photo-slot .photo-del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:9px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:2}
.photo-slot:hover .photo-del{display:flex}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:400;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;transform:scale(.95);transition:transform .3s}
.modal-bg.show .modal{transform:scale(1)}
.modal h3{font-size:17px;font-weight:800;margin-bottom:4px;text-align:center}
.modal .sub{font-size:12px;color:var(--muted);margin-bottom:18px;text-align:center}
.fg{margin-bottom:16px;text-align:left}
#toast-box{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{padding:11px 16px;border-radius:10px;font-size:12px;font-weight:500;max-width:340px;animation:slideIn .3s ease;display:flex;align-items:center;gap:7px;backdrop-filter:blur(8px)}
.toast.hide{animation:slideOut .3s ease forwards}
.toast-s{background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.25);color:#2ecc71}
.toast-e{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.25);color:#e74c3c}
.toast-i{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);color:var(--accent)}
.coin-float{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);color:var(--accent);font-size:20px;font-weight:800;pointer-events:none;z-index:9999;animation:coinUp 1.3s ease-out forwards;text-shadow:0 0 16px rgba(201,168,76,.5)}
@keyframes coinUp{0%{opacity:1;transform:translate(-50%,-50%) scale(.6)}25%{opacity:1;transform:translate(-50%,-70%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-120%) scale(.9)}}
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(24px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeUp .4s ease both}.f1{animation-delay:.05s}.f2{animation-delay:.1s}.f3{animation-delay:.15s}.f4{animation-delay:.2s}.f5{animation-delay:.25s}

@media(max-width:768px){.ntabs{display:none}.bnav{display:block}.dash{padding:66px 0 100px}.sgrid{grid-template-columns:repeat(2,1fr);gap:8px}.sv{font-size:18px}.dgrid{grid-template-columns:1fr}.dhero{padding:20px}.photo-grid{grid-template-columns:repeat(2,1fr)}.store-grid{grid-template-columns:1fr 1fr}.mentor-grid{grid-template-columns:1fr}.ref-tiers{grid-template-columns:repeat(2,1fr)}.dh-coins{margin-left:0;margin-top:6px}.dht{flex-wrap:wrap}}

:'5-day audio program on confidence.',p:100,i:'fa-headphones',cat:'rewards'},{id:'pro_ext',n:'PRO Extension (30 Days)',d:'Extend full access by 30 days.',p:800,i:'fa-gem',cat:'rewards'}];

DB.cur=function(){var s=this.gS();if(!s)return null;return this.fP(s.phone)};
DB.fP=function(p){var us=this.gU();for(var i=0;i<us.length;i++){if(us[i].phone===p)return us[i]}return null};

DB.gUM=function(uid){var ms=this.gM();var r=[];for(var i=0;i<ms.length;i++){if(ms[i].userId===uid)r.push(ms[i])}r.sort(function(a,b){return b.ts-a.ts});return r};
DB.gUB=function(){var s=this.gS();if(!s)return[];var bc=this.gB();var ra=s.ra||0;var r=[];for(var i=0;i<bc.length;i++){if(bc[i].ts>=ra)r.push(bc[i])}r.sort(function(a,b){return b.ts-a.ts});return r};

/* UTILITIES */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function tk(){return new Date().toISOString().split('T')[0]}
function fD(t){return new Date(t).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function fDT(t){return new Date(t).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}
function dS(t){return Math.max(0,Math.floor((Date.now()-t)/864e5))}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function trn(s,n){return s.length>n?s.slice(0,n)+'...':s}
function gLv(xp){for(var i=LX.length-1;i>=0;i--)if(xp>=LX[i])return i+1;return 1}
function gXP(xp){var lv=gLv(xp),c=LX[lv-1]||0,n=LX[lv]||(LX[LX.length-1]*1.5);return{cur:xp-c,need:n-c,pct:Math.min(100,Math.round(((xp-c)/(n-c))*100))}}
function cStreak(h){if(!h)return 0;var s=0,d=new Date(),t=tk();if(h[t]&&taskAnyDone(h[t])){s=1;d.setDate(d.getDate()-1)}else{d.setDate(d.getDate()-1)}for(var i=0;i<365;i++){var k=d.toISOString().split('T')[0];if(h[k]&&taskAnyDone(h[k])){s++;d.setDate(d.getDate()-1)}else break}return s}
function taskAnyDone(d){for(var i=0;i<ALL_TASKS.length;i++){if(d[ALL_TASKS[i].k])return true}return false}
function tProg(h){var t=tk(),d=(h||{})[t]||{};var done=0;for(var i=0;i<ALL_TASKS.length;i++){if(d[ALL_TASKS[i].k])done++}return{done:done,total:ALL_TASKS.length,pct:Math.round((done/ALL_TASKS.length)*100)}}
function rProg(h,rid){var t=tk(),d=(h||{})[t]||{};var r=null;for(var i=0;i<ROUTINES.length;i++){if(ROUTINES[i].id===rid){r=ROUTINES[i];break}}if(!r)return{done:0,total:0,pct:0};var done=0;for(var i=0;i<r.tasks.length;i++){if(d[r.tasks[i].k])done++}return{done:done,total:r.tasks.length,pct:Math.round((done/r.tasks.length)*100)}}

function eBadges(u){var b=[],s=cStreak(u.habits||{}),any=false;if(u.habits){var keys=Object.keys(u.habits);for(var i=0;i<keys.length;i++){var d=u.habits[keys[i]];if(d&&taskAnyDone(d)){any=true;break}}}if(any)b.push('first_step');if(s>=7)b.push('on_fire');if(s>=30)b.push('unstoppable');if(gLv(u.xp||0)>=5)b.push('glow_getter');if(gLv(u.xp||0)>=10)b.push('elite');if((u.refC||0)>=1)b.push('social');if((u.purch||[]).length>=1)b.push('shopper');var wd=0,dd=new Date();dd.setDate(dd.getDate()-1);for(var i=0;i<7;i++){var k=dd.toISOString().split('T')[0];var dh=(u.habits||{})[k]||{};if(taskAllDone(dh)){wd++;dd.setDate(dd.getDate()-1)}else break}if(wd>=7)b.push('week_warrior');return b}
function taskAllDone(d){for(var i=0;i<ALL_TASKS.length;i++){if(!d[ALL_TASKS[i].k])return false}return true}

function addC(uid,amt,reason){var us=DB.gU();for(var i=0;i<us.length;i++){if(us[i].id===uid){us[i].coins=(us[i].coins||0)+amt;if(!us[i].txns)us[i].txns=[];us[i].txns.push({t:'earn',r:reason,a:amt,ts:Date.now()});break}}DB.sU(us)}

var activeTimers={};
function clearAllTimers(){for(var k in activeTimers){clearInterval(activeTimers[k])}activeTimers={}}
function startTimer(taskKey,duration){if(activeTimers[taskKey])return;var endTime=Date.now()+duration*1000;var el=document.querySelector('[data-timer="'+taskKey+'"]');if(!el)return;el.innerHTML='<div class="timer-display"><span class="timer-text">'+fmtTime(duration)+'</span><div class="timer-bar"><div class="timer-fill" style="width:100%"></div></div></div>';activeTimers[taskKey]=setInterval(function(){var rem=Math.max(0,Math.ceil((endTime-Date.now())/1000));var txtEl=el.querySelector('.timer-text'),fillEl=el.querySelector('.timer-fill');if(!txtEl||!fillEl){clearInterval(activeTimers[taskKey]);delete activeTimers[taskKey];return}txtEl.textContent=fmtTime(rem);fillEl.style.width=((rem/duration)*100)+'%';if(rem<=0){clearInterval(activeTimers[taskKey]);delete activeTimers[taskKey];el.innerHTML='<i class="fa-solid fa-check timer-done"></i>';toggleTask(taskKey)}},200)}

function toggleTask(key){var u=DB.cur();if(!u)return;var us=DB.gU(),idx=-1;for(var i=0;i<us.length;i++){if(us[i].id===u.id){idx=i;break}}if(idx===-1)return;if(!us[idx].habits)us[idx].habits={};var t=tk();if(!us[idx].habits[t])us[idx].habits[t]={};var wasAll=taskAllDone(us[idx].habits[t]);us[idx].habits[t][key]=!us[idx].habits[t][key];var nowAll=taskAllDone(us[idx].habits[t]);DB.sU(us);if(us[idx].habits[t][key])addXP(u.id,5);if(!wasAll&&nowAll){addC(u.id,10,'All daily tasks completed');cFloat(10);addXP(u.id,20);var s=cStreak(us[idx].habits);if(s>=7&&(us[idx].lastSB||0)<Math.floor(s/7)*7){var bonus=Math.floor(s/7)*50;addC(u.id,bonus,s+'-day streak bonus');cFloat(bonus);us[idx].lastSB=Math.floor(s/7)*7;DB.sU(DB.gU())}toast('All tasks done! +10 Glow Cash','s')}render()}

document.getElementById('photo-input').addEventListener('change',function(){var idx=parseInt(this.dataset.idx);var file=this.files[0];if(!file)return;var u=DB.cur();if(!u)return;resizeImage(file,400,function(data){var photos=loadPhotos(u.id);photos[idx]=data;savePhotos(u.id,photos);toast('Progress photo saved!','s');render()});this.value=''});

function hSendMsg(){var u=DB.cur();if(!u)return;var ta=document.getElementById('sm');var msg=ta?ta.value.trim():'';if(!msg){toast('Type a message.','e');return}var ms=DB.gM();ms.push({id:uid(),userId:u.id,userName:u.name,userPhone:u.phone,message:msg,reply:'',st:'pending',ts:Date.now()});DB.sM(ms);addXP(u.id,2);toast('Message sent.','s');render()}
function hBuy(id){var u=DB.cur();if(!u)return;var item=null;for(var i=0;i<STORE.length;i++){if(STORE[i].id===id){item=STORE[i];break}}if(!item)return;if((u.purch||[]).indexOf(id)!==-1){toast('Already owned.','i');return}if(!spendC(u.id,item.p,'Purchased: '+item.n)){toast('Not enough Glow Cash.','e');return}if(item.cat==='skincare'){buyingItem=id;openModal('<h3>Shipping Address</h3><p class="sub">Enter your delivery address for '+esc(item.n)+'</p><div class="fg"><label class="label">Full Name</label><input type="text" class="input" id="ship-name" value="'+esc(u.name)+'"></div><div class="fg"><label class="label">Phone</label><input type="tel" class="input" id="ship-phone" value="'+esc(u.phone)+'"></div><div class="fg"><label class="label">Address Line 1</label><input type="text" class="input" id="ship-a1" placeholder="House/Flat No., Street"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div class="fg"><label class="label">City</label><input type="text" class="input" id="ship-city" placeholder="Mumbai"></div><div class="fg"><label class="label">PIN Code</label><input type="text" class="input" id="ship-pin" placeholder="400001"></div></div><div class="fg"><label class="label">State</label><input type="text" class="input" id="ship-state" placeholder="Maharashtra"></div><button class="btn btn-p btn-sm" data-action="confirm-ship" style="margin-top:12px;">Confirm Order</button>');return}var us=DB.gU();for(var i=0;i<us.length;i++){if(us[i].id===u.id){if(!us[i].purch)us[i].purch=[];us[i].purch.push(id);if(item.unlock)us[i].unlocks[item.unlock]=true;break}}DB.sU(us);var msgs={wallpack:'Wallpaper pack downloaded!',motiv_pdf:'Motivation Blueprint downloaded!',routine_tpl:'Premium routines unlocked!',skin_bible:'Skincare Bible downloaded!',group_ws:'Workshop access granted!',mentor_1on1:'Mentor session unlocked!',discount:'Code: GLOW20',conf_audio:'Audio course downloaded!',pro_ext:'Access extended 30 days!'};toast(msgs[id]||'Purchase complete!','s');addXP(u.id,10);render()}
function hConfirmShip(){var n=document.getElementById('ship-name').value.trim(),ph=document.getElementById('ship-phone').value.trim(),a1=document.getElementById('ship-a1').value.trim(),ci=document.getElementById('ship-city').value.trim(),pi=document.getElementById('ship-pin').value.trim(),st=document.getElementById('ship-state').value.trim();if(!n||!ph||!a1||!ci||!pi||!st){toast('Fill all address fields.','e');return}var u=DB.cur();if(!u)return;var item=null;for(var i=0;i<STORE.length;i++){if(STORE[i].id===buyingItem){item=STORE[i];break}}if(!item)return;var us=DB.gU();for(var i=0;i<us.length;i++){if(us[i].id===u.id){if(!us[i].purch)us[i].purch=[];us[i].purch.push(buyingItem);break}}DB.sU(us);var addr=n+', '+a1+', '+ci+', '+st+' - '+pi;var ords=DB.gO();ords.push({id:uid(),userId:u.id,userName:u.name,userPhone:u.phone,itemId:item.id,itemName:item.n,img:item.img||'',coins:item.p,address:addr,status:'pending',ts:Date.now()});DB.sO(ords);closeModal();toast(item.n+' ordered!','s');addXP(u.id,15);render()}
function hCheckin(){var u=DB.cur();if(!u)return;if(u.lastCI===tk())return;var us=DB.gU();for(var i=0;i<us.length;i++){if(us[i].id===u.id){us[i].lastCI=tk();break}}DB.sU(us);addC(u.id,5,'Daily check-in');cFloat(5);addXP(u.id,3);toast('+5 Glow Cash!','s');render()}
function hBookM(id){var u=DB.cur();if(!u)return;if(!spendC(u.id,500,'Mentor session')){toast('Need 500 coins.','e');return}var m=null;for(var i=0;i<MENTORS.length;i++){if(MENTORS[i].id===id){m=MENTORS[i];break}}toast('Session booked with '+(m?m.n:'Coach')+'!','s');addXP(u.id,15);render()}
