<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOWUP — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#08080a;--card:#0f0f12;--card2:#131316;--border:#1a1a1f;--border2:#26262d;
--fg:#fff;--muted:#888;--dim:#4a4a52;--accent:#c9a84c;--accent2:#e0c672;
--abg:rgba(201,168,76,.06);--abg2:rgba(201,168,76,.12);
--danger:#e74c3c;--success:#2ecc71;--warn:#f39c12;--info:#3b82f6;
--gg:linear-gradient(135deg,#c9a84c,#e0c672,#c9a84c);
--gt:linear-gradient(135deg,#c9a84c 0%,#f0dfa0 50%,#c9a84c 100%)
}
html{scroll-behavior:smooth}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden;line-height:1.6}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
a{color:var(--accent);text-decoration:none}

.gold-text{background:var(--gt);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Layout */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:250px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;transition:transform .3s}
.sb-logo{padding:20px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo span{font-size:15px;font-weight:800;letter-spacing:2px}.sb-logo span em{color:var(--accent);font-style:normal}
.sb-badge{font-size:8px;font-weight:700;letter-spacing:1px;color:#000;background:var(--gg);padding:2px 8px;border-radius:4px;text-transform:uppercase}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-link{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:12.5px;font-weight:500;color:var(--dim);cursor:pointer;transition:all .2s;border:1px solid transparent;margin-bottom:2px;position:relative}
.sb-link:hover{color:var(--muted);background:rgba(255,255,255,.02)}
.sb-link.active{color:var(--accent);background:var(--abg);border-color:rgba(201,168,76,.12)}
.sb-link i{width:18px;text-align:center;font-size:13px}
.sb-link .cnt{margin-left:auto;font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;min-width:18px;text-align:center}
.cnt-warn{background:rgba(243,156,18,.15);color:var(--warn)}
.cnt-red{background:rgba(231,76,60,.15);color:var(--danger)}
.cnt-gold{background:var(--abg2);color:var(--accent)}
.sb-foot{padding:14px 18px;border-top:1px solid var(--border);font-size:10px;color:var(--dim)}
.sb-foot span{display:block;font-size:9px;margin-top:2px}

.main{margin-left:250px;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:rgba(8,8,10,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:40}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-title{font-size:16px;font-weight:700}
.tb-sub{font-size:11px;color:var(--dim)}
.tb-right{display:flex;align-items:center;gap:10px}
.hamburger{display:none;width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:0 0;color:var(--muted);cursor:pointer;font-size:15px;align-items:center;justify-content:center}

.content{padding:24px 28px;max-width:1300px}

/* Cards & Components */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;transition:all .3s}
.card:hover{border-color:var(--border2)}
.gc{border:1px solid rgba(201,168,76,.06)}.gc:hover{border-color:rgba(201,168,76,.15);box-shadow:0 0 24px rgba(201,168,76,.03)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;padding:10px 20px;border-radius:9px;border:none;cursor:pointer;transition:all .25s;outline:none;white-space:nowrap}
.btn:focus-visible{box-shadow:0 0 0 2px var(--accent)}
.bp{background:var(--gg);color:#0a0a0a;font-weight:700}.bp:hover{filter:brightness(1.1);transform:translateY(-1px)}
.bo{background:0 0;color:var(--fg);border:1px solid var(--border2)}.bo:hover{border-color:var(--accent);color:var(--accent)}
.bd{background:rgba(231,76,60,.08);color:#e74c3c;border:1px solid rgba(231,76,60,.15)}.bd:hover{background:rgba(231,76,60,.14)}
.bs{background:rgba(46,204,113,.08);color:#2ecc71;border:1px solid rgba(46,204,113,.15)}.bs:hover{background:rgba(46,204,113,.14)}
.bw{background:rgba(59,130,246,.08);color:#3b82f6;border:1px solid rgba(59,130,246,.15)}.bw:hover{background:rgba(59,130,246,.14)}
.bsm{padding:7px 14px;font-size:11px;border-radius:7px}
.bxs{padding:5px 10px;font-size:10px;border-radius:6px}
.bf{width:100%}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;filter:none!important}
.input{width:100%;background:#0a0a0b;border:1px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--fg);font-family:'Poppins',sans-serif;font-size:13px;transition:border-color .25s;outline:none}
.input:focus{border-color:var(--accent)}.input::placeholder{color:var(--dim)}
textarea.input{resize:vertical;min-height:70px;line-height:1.5}
.label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:7px;letter-spacing:.2px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.b-pending{background:rgba(243,156,18,.1);color:var(--warn)}
.b-approved{background:rgba(46,204,113,.1);color:var(--success)}
.b-rejected{background:rgba(231,76,60,.1);color:var(--danger)}
.b-replied{background:var(--abg);color:var(--accent)}
.b-resolved{background:rgba(46,204,113,.1);color:var(--success)}
.b-shipped{background:rgba(59,130,246,.1);color:var(--info)}

/* Stats Grid */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat{padding:20px;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.04}
.stat-gold::after{background:var(--accent)}.stat-green::after{background:var(--success)}.stat-blue::after{background:var(--info)}.stat-red::after{background:var(--danger)}
.stat-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:12px}
.stat-gold .stat-icon{background:var(--abg2);color:var(--accent)}
.stat-green .stat-icon{background:rgba(46,204,113,.1);color:var(--success)}
.stat-blue .stat-icon{background:rgba(59,130,246,.1);color:var(--info)}
.stat-red .stat-icon{background:rgba(231,76,60,.1);color:var(--danger)}
.stat-val{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-gold .stat-val{color:var(--accent)}.stat-green .stat-val{color:var(--success)}.stat-blue .stat-val{color:var(--info)}.stat-red .stat-val{color:var(--danger)}
.stat-lbl{font-size:10px;color:var(--dim);font-weight:600;letter-spacing:.6px;text-transform:uppercase}
.stat-sub{font-size:10px;color:var(--muted);margin-top:3px}

/* Section */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.sec-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.sec-title i{color:var(--accent);font-size:13px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.grid-1{margin-bottom:24px}

/* User Row */
.u-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.025);transition:background .15s}
.u-row:last-child{border-bottom:none}
.u-row:hover{background:rgba(255,255,255,.012)}
.u-av{width:36px;height:36px;border-radius:9px;background:var(--abg2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--accent);flex-shrink:0}
.u-info{flex:1;min-width:0}
.u-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u-meta{font-size:10px;color:var(--dim);display:flex;gap:8px;flex-wrap:wrap;margin-top:1px}
.u-meta span{display:flex;align-items:center;gap:3px}
.u-meta i{font-size:8px}
.u-acts{display:flex;gap:5px;flex-shrink:0}

/* Payment Request Card */
.pay-card{padding:16px;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;background:var(--card);transition:all .2s}
.pay-card:hover{border-color:var(--border2)}
.pay-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pay-user{display:flex;align-items:center;gap:10px}
.pay-thumb{width:80px;height:80px;border-radius:8px;object-fit:cover;background:var(--abg);border:1px solid var(--border)}
.pay-details{flex:1}
.pay-name{font-size:13px;font-weight:700}
.pay-phone{font-size:11px;color:var(--dim)}
.pay-time{font-size:10px;color:var(--dim);margin-top:2px}
.pay-amount{font-size:15px;font-weight:800;color:var(--accent)}
.pay-actions{display:flex;gap:8px;margin-top:10px}

/* Message Layout */
.msg-layout{display:grid;grid-template-columns:300px 1fr;gap:0;border:1px solid var(--border);border-radius:14px;overflow:hidden;min-height:460px}
.msg-list{border-right:1px solid var(--border);overflow-y:auto;max-height:520px}
.msg-item{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.02);cursor:pointer;transition:background .2s}
.msg-item:hover{background:rgba(255,255,255,.015)}
.msg-item.active{background:var(--abg);border-left:3px solid var(--accent)}
.msg-item-name{font-size:11px;font-weight:700;margin-bottom:2px}
.msg-item-preview{font-size:10px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-item-meta{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.msg-item-time{font-size:9px;color:var(--dim)}
.msg-detail{display:flex;flex-direction:column}
.msg-detail-header{padding:16px 20px;border-bottom:1px solid var(--border)}
.msg-detail-body{padding:20px;flex:1;overflow-y:auto}
.msg-detail-footer{padding:12px 20px;border-top:1px solid var(--border)}
.msg-detail-actions{display:flex;gap:6px;margin-top:8px}
.msg-bubble{padding:10px 14px;border-radius:10px;font-size:12px;line-height:1.6;max-width:85%;margin-bottom:6px}
.msg-user{background:var(--abg);color:#bbb;border:1px solid rgba(201,168,76,.06)}
.msg-admin{background:rgba(46,204,113,.04);color:#aaa;border:1px solid rgba(46,204,113,.06);margin-left:auto}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--dim);text-align:center}
.empty-state i{font-size:32px;margin-bottom:12px;opacity:.15}
.empty-state p{font-size:12px}

/* Order Row */
.ord-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.025)}
.ord-row:last-child{border-bottom:none}
.ord-img{width:50px;height:50px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--abg)}
.ord-info{flex:1;min-width:0}
.ord-name{font-size:13px;font-weight:600}
.ord-addr{font-size:10px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px}
.ord-meta{font-size:10px;color:var(--dim);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}

/* Referral Leaderboard */
.ref-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.025)}
.ref-row:last-child{border-bottom:none}
.ref-rank{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.ref-rank.top{background:var(--abg2);color:var(--accent)}
.ref-rank.normal{background:var(--abg);color:var(--dim)}
.ref-count{font-size:18px;font-weight:800;color:var(--accent);min-width:40px;text-align:right}
.ref-label{font-size:9px;color:var(--dim);text-align:right}

/* Broadcast */
.bc-item{padding:14px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:rgba(255,255,255,.01)}
.bc-item p{font-size:12px;color:#aaa;line-height:1.6}
.bc-item time{font-size:9px;color:var(--dim);margin-top:6px;display:block}

/* Chart */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:24px}
.chart-wrap h3{font-size:13px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:7px}
.chart-wrap h3 i{color:var(--accent);font-size:12px}
#chart{width:100%;height:200px;display:block}

/* Add User Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}

/* Filters */
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fbtn{padding:5px 12px;font-size:10px;font-weight:600;border-radius:7px;border:1px solid var(--border);background:0 0;color:var(--dim);cursor:pointer;font-family:'Poppins',sans-serif;transition:all .2s}
.fbtn.active{background:var(--abg);border-color:rgba(201,168,76,.2);color:var(--accent)}

/* Divider */
.div{height:1px;background:var(--border);margin:18px 0}

/* Toast */
#tb{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{padding:11px 16px;border-radius:10px;font-size:12px;font-weight:500;max-width:360px;animation:ti .35s ease;display:flex;align-items:center;gap:7px}
.toast.out{animation:to .3s ease forwards}
.ts{background:#0f2416;border:1px solid rgba(46,204,113,.3);color:#2ecc71}
.te{background:#241010;border:1px solid rgba(231,76,60,.3);color:#e74c3c}
.ti{background:#1a1608;border:1px solid rgba(201,168,76,.3);color:var(--accent)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:300;padding:24px;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;transform:scale(.95);transition:transform .3s}
.modal-bg.show .modal{transform:scale(1)}
.modal h3{font-size:17px;font-weight:800;margin-bottom:4px;text-align:center}
.modal .sub{font-size:12px;color:var(--muted);margin-bottom:20px;text-align:center}

/* Screenshot preview */
.ss-preview{max-width:200px;max-height:200px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:opacity .2s}
.ss-preview:hover{opacity:.85}

/* Overlay for mobile sidebar */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:45}
.sb-overlay.show{display:block}

@keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes ti{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes to{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(28px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.anim{animation:fi .4s ease both}.a1{animation-delay:.05s}.a2{animation-delay:.1s}.a3{animation-delay:.15s}.a4{animation-delay:.2s}.a5{animation-delay:.25s}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@media(max-width:1024px){.stats{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
.sb-overlay.show{display:block}.hamburger{display:flex}
.main{margin-left:0}.content{padding:16px}.topbar{padding:12px 16px}
.msg-layout{grid-template-columns:1fr}.msg-list{border-right:none;border-bottom:1px solid var(--border);max-height:180px}
.form-grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr;gap:8px}
.stat-val{font-size:22px}
}
@media(max-width:480px){.stats{grid-template-columns:1fr}.pay-head{flex-direction:column;align-items:flex-start;gap:8px}.pay-actions{flex-direction:column}}
</style>
</head>
<body>

<div class="sb-overlay" id="sb-overlay"></div>

<aside class="sidebar" id="sidebar">
<div class="sb-logo">
<span>GLOW<em>UP</em></span>
<span class="sb-badge">Admin</span>
</div>
<nav class="sb-nav" id="sb-nav"></nav>
<div class="sb-foot">
<i class="fa-solid fa-shield-halved" style="margin-right:3px;"></i> Admin Panel
<span id="sb-time"></span>
</div>
</aside>

<div class="main">
<header class="topbar">
<div class="tb-left">
<button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
<div>
<div class="tb-title" id="tb-title">Overview</div>
<div class="tb-sub" id="tb-sub">Dashboard analytics</div>
</div>
</div>
<div class="tb-right">
<button class="btn bo bxs" id="btn-refresh" title="Refresh data"><i class="fa-solid fa-arrows-rotate"></i></button>
<a href="index.html" class="btn bo bxs" id="btn-site" title="Visit website" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:'Poppins',sans-serif;font-size:10px;font-weight:600;padding:5px 10px;border-radius:7px;border:1px solid var(--border2);background:0 0;color:var(--fg);cursor:pointer;transition:all .25s;white-space:nowrap;"><i class="fa-solid fa-globe"></i></a> <a href="index.html" class="btn bo bxs" id="btn-site" title="Visit website" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:'Poppins',sans-serif;font-size:10px;font-weight:600;padding:5px 10px;border-radius:7px;border:1px solid var(--border2);background:0 0;color:var(--fg);cursor:pointer;transition:all .25s;white-space:nowrap;"><i class="fa-solid fa-globe"></i></a> <a href="index.html" class="btn bo bxs" id="btn-site" title="Visit website" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:'Poppins',sans-serif;font-size:10px;font-weight:600;padding:5px 10px;border-radius:7px;border:1px solid var(--border2);background:0 0;color:var(--fg);cursor:pointer;transition:all .25s;white-space:nowrap;"><i class="fa-solid fa-globe"></i></a> <button class="btn bd bxs" id="btn-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
</div>
</header>
<div class="content" id="content"></div>
</div>

<div id="tb"></div>
<div class="modal-bg" id="modal-bg"></div>

<script>
/* ===================== CONSTANTS ===================== */
const AE='admin@gmail.com',AP='admin123',PRICE=99;
const LX=[0,100,250,500,800,1200,1700,2300,3000,4000];
const gLv=xp=>{for(let i=LX.length-1;i>=0;i--)if(xp>=LX[i])return i+1;return 1};

/* ===================== DATA LAYER ===================== */
const D={
_g(k){try{return JSON.parse(localStorage.getItem('g_'+k))||null}catch{return null}},
_s(k,v){localStorage.setItem('g_'+k,JSON.stringify(v))},
gU(){return this._g('users')||[]},sU(u){this._s('users',u)},
gM(){return this._g('msgs')||[]},sM(m){this._s('msgs',m)},
gB(){return this._g('bcasts')||[]},sB(b){this._s('bcasts',b)},
gO(){return this._g('orders')||[]},sO(o){this._s('orders',o)},
gP(){return this._g('payments')||[]},sP(p){this._s('payments',p)},
gS(){return this._g('sess')},cS(){localStorage.removeItem('g_sess')},
fPI(id){return this.gU().find(u=>u.id===id)}
};

/* ===================== HELPERS ===================== */
const fDT=t=>new Date(t).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
const fD=t=>new Date(t).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
const trn=(s,n)=>s.length>n?s.slice(0,n)+'...':s;
const ini=u=>(u.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const dA=t=>Math.max(0,Math.floor((Date.now()-t)/864e5));

function toast(msg,type='i'){
const b=document.getElementById('tb'),ic={s:'fa-check-circle',e:'fa-exclamation-circle',i:'fa-coins'};
const el=document.createElement('div');el.className='toast t'+type;
el.innerHTML='<i class="fa-solid '+ic[type]+'"></i><span>'+esc(msg)+'</span>';

function drawChart(){
const c=document.getElementById('chart');if(!c)return;
const ctx=c.getContext('2d'),us=D.gU();
const dpr=devicePixelRatio||1,r=c.getBoundingClientRect();
c.width=r.width*dpr;c.height=r.height*dpr;ctx.scale(dpr,dpr);
const w=r.width,h=r.height,days=[];
for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().split('T')[0];days.push({l:d.toLocaleDateString('en-US',{weekday:'short'}),c:us.filter(u=>u.createdAt&&new Date(u.createdAt).toISOString().split('T')[0]===k).length})}
const mx=Math.max(...days.map(d=>d.c),1),pd={t:8,r:8,b:22,l:28},cw=w-pd.l-pd.r,ch=h-pd.t-pd.b,gap=cw/days.length,bw=Math.max(1,gap*.45);
ctx.clearRect(0,0,w,h);
days.forEach((d,i)=>{const x=pd.l+gap*i+(gap-bw)/2,bh=Math.max(0,(d.c/mx)*ch),y=pd.t+ch-bh;
const g=ctx.createLinearGradient(x,y,x,y+bh);g.addColorStop(0,'#c9a84c');g.addColorStop(1,'rgba(201,168,76,.2)');ctx.fillStyle=g;
ctx.beginPath();const rr=Math.min(4,bw/2);ctx.moveTo(x+rr,y);ctx.lineTo(x+bw-rr,y);ctx.quadraticCurveTo(x+bw,y,x+bw,y+rr);ctx.lineTo(x+bw,y+bh);ctx.lineTo(x,y+bh);ctx.lineTo(x,y+rr);ctx.quadraticCurveTo(x,y,x+rr,y);ctx.fill();
ctx.fillStyle='#444';ctx.font='500 9px Poppins';ctx.textAlign='center';ctx.fillText(d.l,x+bw/2,h-3);
if(d.c>0){ctx.fillStyle='#c9a84c';ctx.font='700 10px Poppins';ctx.fillText(d.c,x+bw/2,y-5)}});
}

/* ===================== USER DETAIL MODAL ===================== */
function viewUserDetail(id){
const u=D.fPI(id);if(!u)return;
const lv=gLv(u.xp||0),streak=cStreak(u.habits||{}),days=dA(u.createdAt);
const txns=(u.txns||[]).slice(-10).reverse();
const purch=u.purch||[];
const LXN=[0,100,250,500,800,1200,1700,2300,3000,4000];
const cLvl=LXN[lv-1]||0,nLvl=LXN[lv]||(LXN[LXN.length-1]*1.5);
const xpPct=Math.min(100,Math.round(((u.xp-cLvl)/(nLvl-cLvl))*100));
openModal(`
<h3>${esc(u.name)}</h3>
<p class="sub">${esc(u.phone)} &middot; Joined ${fD(u.createdAt)}</p>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;">
<div style="text-align:center;padding:10px;background:var(--abg);border-radius:8px;"><div style="font-size:18px;font-weight:800;color:var(--accent);">Lvl ${lv}</div><div style="font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;">Level</div></div>
<div style="text-align:center;padding:10px;background:rgba(255,255,255,.02);border-radius:8px;"><div style="font-size:18px;font-weight:800;">${u.coins||0}</div><div style="font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;">Coins</div></div>
<div style="text-align:center;padding:10px;background:rgba(255,255,255,.02);border-radius:8px;"><div style="font-size:18px;font-weight:800;color:var(--warn);">${streak}</div><div style="font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;">Streak</div></div>
<div style="text-align:center;padding:10px;background:rgba(255,255,255,.02);border-radius:8px;"><div style="font-size:18px;font-weight:800;">${u.refC||0}</div><div style="font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;">Referrals</div></div>
</div>
<div style="margin-bottom:14px;"><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-bottom:4px;"><span>XP: ${u.xp||0}</span><span>${xpPct}% to Level ${lv+1}</span></div><div style="height:6px;background:#0c0c0c;border-radius:3px;overflow:hidden;"><div style="height:100%;width:${xpPct}%;background:var(--gg);border-radius:3px;"></div></div></div>
<div style="margin-bottom:14px;"><label class="label">Purchases (${purch.length})</label>
 ${purch.length?purch.map(pid=>`<div style="font-size:11px;color:#aaa;padding:4px 0;"><i class="fa-solid fa-check" style="color:var(--success);margin-right:5px;font-size:9px;"></i>${pid}</div>`).join(''):'<div style="font-size:11px;color:var(--dim);">No purchases.</div>'}
</div>
<div><label class="label">Recent Transactions</label>
 ${txns.length?txns.map(t=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.025);"><div><span style="font-size:11px;color:#aaa;">${esc(t.r)}</span><div style="font-size:9px;color:var(--dim);">${fDT(t.ts)}</div></div><span style="font-size:11px;font-weight:700;color:${t.a>0?'var(--success)':'var(--danger)'};">${t.a>0?'+':''}${t.a}</span></div>`).join(''):'<div style="font-size:11px;color:var(--dim);">No transactions.</div>'}
</div>
<div class="div"></div>
<div style="display:flex;gap:8px;">
<button class="btn bo bsm bf" data-action="edit-coins" data-id="${u.id}"><i class="fa-solid fa-coins"></i> Adjust Coins</button>

/* ===================== ACTIONS ===================== */
function bindContent(){
/* Filters */
document.querySelectorAll('[data-filter]').forEach(el=>el.addEventListener('click',()=>{payFil=el.dataset.filter;renderContent()}));
document.querySelectorAll('[data-ufil]').forEach(el=>el.addEventListener('click',()=>{userFil=el.dataset.ufil;renderContent()}));

/* All data-action in content */
document.querySelectorAll('#content [data-action]').forEach(el=>el.addEventListener('click',()=>handleAction(el.dataset.action,el.dataset)));
}

function bindModal(){
document.querySelectorAll('.modal [data-action]').forEach(el=>el.addEventListener('click',()=>handleAction(el.dataset.action,el.dataset)));
}

function handleAction(action,data){
switch(action){
case'quick-approve':quickApprove(data.id);break;
case'approve-pay':approvePay(data.id,false);break;
case'approve-create':approvePay(data.id,true);break;
case'reject-pay':rejectPay(data.id);break;
case'view-ss':viewScreenshot(data.src);break;
case'add-user':addUser();break;
case'del-user':deleteUser(data.id);break;
case'view-user':viewUserDetail(data.id);break;
case'sel-msg':msgSel=data.id;renderContent();break;
case'reply-msg':replyMsg(data.id);break;
case'resolve-msg':resolveMsg(data.id);break;
case'ship-ord':shipOrder(data.id);break;
case'send-bc':sendBroadcast();break;
case'go-msg':tab='messages';msgSel=data.id;renderNav();renderContent();break;
case'edit-coins':editCoins(data.id);break;
case'edit-xp':editXP(data.id);break;
}
}

/* Payment Actions */
function quickApprove(id){approvePay(id,false)}
function approvePay(id,createAccount){
const pays=D.gP();const i=pays.findIndex(p=>p.id===id);if(i===-1)return;
const p=pays[i];p.status='approved';p.approvedAt=Date.now();D.sP(pays);

if(createAccount&&!D.fPI(p.userId)){
const name=p.userName||'User',phone=p.phone||'';
if(phone){
const u={id:uid(),name,phone,password:'glow'+Math.random().toString(36).slice(2,6),createdAt:Date.now(),habits:{},xp:0,coins:20,progress:0,refCode:uid().slice(0,8),refBy:null,refC:0,txns:[{t:'earn',r:'Welcome bonus',a:20,ts:Date.now()}],purch:[],unlocks:{},lastCI:null,banned:false};
const us=D.gU();us.push(u);D.sU(us);
toast('Payment approved & account created: '+phone+' / '+u.password,'s');
}else{toast('No phone number. Can\'t create account.','e')}
}else{toast('Payment approved.','s')}
renderNav();renderContent();
}

function rejectPay(id){
openModal(`<h3>Reject Payment?</h3><p class="sub">This will mark the payment as rejected. The user won't be notified automatically.</p>
<div style="margin-bottom:16px;"><label class="label">Reason (optional)</label><textarea class="input" id="rej-reason" placeholder="e.g. Screenshot unclear, wrong amount..."></textarea></div>
<div style="display:flex;gap:8px;"><button class="btn bd bf" data-action="confirm-reject" data-id="${id}"><i class="fa-solid fa-xmark"></i> Reject</button><button class="btn bo bf" onclick="closeModal()">Cancel</button></div>`);
bindModal();
/* Attach confirm reject handler */
setTimeout(()=>{
const btn=document.querySelector('[data-action="confirm-reject"]');
if(btn)btn.addEventListener('click',()=>{confirmReject(id)});
},50);
}
function confirmReject(id){
const reason=document.getElementById('rej-reason')?.value||'';
const pays=D.gP();const i=pays.findIndex(p=>p.id===id);if(i===-1)return;
pays[i].status='rejected';pays[i].rejectReason=reason;pays[i].rejectedAt=Date.now();D.sP(pays);
closeModal();toast('Payment rejected.','i');renderNav();renderContent();
}

function viewScreenshot(src){
openModal(`<h3>Payment Proof</h3><p class="sub">User's payment screenshot</p>
<div style="text-align:center;"><img src="${src}" style="max-width:100%;max-height:70vh;border-radius:10px;border:1px solid var(--border);" alt="Payment screenshot"></div>
<div style="margin-top:14px;text-align:center;"><button class="btn bo bsm" onclick="closeModal()">Close</button></div>`);
}

/* User Actions */
function addUser(){
const name=document.getElementById('au-name')?.value.trim();
const phone=document.getElementById('au-phone')?.value.trim();
const pass=document.getElementById('au-pass')?.value;
if(!name||!phone||!pass){toast('Fill in all fields.','e');return}
if(D.gU().find(u=>u.phone===phone)){toast('Phone already exists.','e');return}
const u={id:uid(),name,phone,password:pass,createdAt:Date.now(),habits:{},xp:0,coins:20,progress:0,refCode:uid().slice(0,8),refBy:null,refC:0,txns:[{t:'earn',r:'Welcome bonus',a:20,ts:Date.now()}],purch:[],unlocks:{},lastCI:null,banned:false};

/* Handle referral code from sessionStorage */
const refCode=sessionStorage.getItem('g_ref');
if(refCode){const us=D.gU();const ri=us.findIndex(x=>x.refCode===refCode);
if(ri!==-1){us[ri].refC=(us[ri].refC||0)+1;us[ri].coins=(us[ri].coins||0)+20;us[ri].txns.push({t:'earn',r:'Referral: '+name,a:20,ts:Date.now()});u.coins+=20;u.refBy=us[ri].id;u.txns.push({t:'earn',r:'Referral bonus',a:20,ts:Date.now()});D.sU(us);sessionStorage.removeItem('g_ref')}}

const us=D.gU();us.push(u);D.sU(us);
toast('Account created! Phone: '+phone+' / Pass: '+pass,'s');
document.getElementById('au-name').value='';document.getElementById('au-phone').value='';document.getElementById('au-pass').value='';
renderNav();renderContent();
}

function deleteUser(id){
openModal(`<h3>Delete User?</h3><p class="sub">This action cannot be undone. All user data will be permanently removed.</p>
<div style="display:flex;gap:8px;margin-top:16px;"><button class="btn bd bf" id="confirm-del"><i class="fa-solid fa-trash"></i> Delete</button><button class="btn bo bf" onclick="closeModal()">Cancel</button></div>`);
setTimeout(()=>{
document.getElementById('confirm-del')?.addEventListener('click',()=>{
const us=D.gU().filter(u=>u.id!==id);D.sU(us);closeModal();toast('User deleted.','i');renderNav();renderContent();
});
},50);
}

function editCoins(id){
openModal(`<h3>Adjust Coins</h3><p class="sub">Add or subtract Glow Cash from this user.</p>
<div style="margin-bottom:14px;"><label class="label">Amount (use negative to subtract)</label><input type="number" class="input" id="coin-amt" placeholder="e.g. 100 or -50"></div>
<div style="margin-bottom:14px;"><label class="label">Reason</label><input type="text" class="input" id="coin-reason" placeholder="e.g. Bonus, correction..."></div>
<button class="btn bp bf" data-action="save-coins" data-id="${id}">Save</button>`);
bindModal();
setTimeout(()=>{
document.querySelector('[data-action="save-coins"]')?.addEventListener('click',()=>{
const amt=parseInt(document.getElementById('coin-amt')?.value);
const reason=document.getElementById('coin-reason')?.value.trim()||'Admin adjustment';
if(isNaN(amt)||amt===0){toast('Enter a valid amount.','e');return}
const us=D.gU();const i=us.findIndex(u=>u.id===id);if(i===-1)return;
us[i].coins=(us[i].coins||0)+amt;
if(!us[i].txns)us[i].txns=[];
us[i].txns.push({t:amt>0?'earn':'spend',r:reason,a:amt,ts:Date.now()});
D.sU(us);closeModal();toast((amt>0?'+':'')+amt+' coins.','s');viewUserDetail(id);
});
},50);
}

function editXP(id){
openModal(`<h3>Adjust XP</h3><p class="sub">Add or subtract XP from this user.</p>
<div style="margin-bottom:14px;"><label class="label">Amount (use negative to subtract)</label><input type="number" class="input" id="xp-amt" placeholder="e.g. 50 or -30"></div>
<div style="margin-bottom:14px;"><label class="label">Reason</label><input type="text" class="input" id="xp-reason" placeholder="e.g. Bonus, correction..."></div>
<button class="btn bp bf" data-action="save-xp" data-id="${id}">Save</button>`);
bindModal();
setTimeout(()=>{
document.querySelector('[data-action="save-xp"]')?.addEventListener('click',()=>{
const amt=parseInt(document.getElementById('xp-amt')?.value);
const reason=document.getElementById('xp-reason')?.value.trim()||'Admin adjustment';
if(isNaN(amt)||amt===0){toast('Enter a valid amount.','e');return}
const us=D.gU();const i=us.findIndex(u=>u.id===id);if(i===-1)return;
us[i].xp=(us[i].xp||0)+amt;D.sU(us);closeModal();toast((amt>0?'+':'')+amt+' XP.','s');viewUserDetail(id);
});
},50);
}

/* Message Actions */
function replyMsg(id){
const ta=document.getElementById('msg-reply');const r=ta?ta.value.trim():'';
if(!r){toast('Type a reply.','e');return}
const ms=D.gM();const i=ms.findIndex(m=>m.id===id);if(i===-1)return;
ms[i].reply=r;ms[i].st='replied';D.sM(ms);toast('Reply sent.','s');renderNav();renderContent();
}
function resolveMsg(id){
const ms=D.gM();const i=ms.findIndex(m=>m.id===id);if(i===-1)return;
ms[i].st='resolved';D.sM(ms);toast('Resolved.','s');renderNav();renderContent();
}

/* Order Actions */
function shipOrder(id){
const ords=D.gO();const i=ords.findIndex(o=>o.id===id);if(i===-1)return;
ords[i].status='shipped';ords[i].shippedAt=Date.now();D.sO(ords);toast('Marked as shipped.','s');renderNav();renderContent();
}

/* Broadcast */
function sendBroadcast(){
const ta=document.getElementById('bc-msg');const msg=ta?ta.value.trim():'';
if(!msg){toast('Write a message.','e');return}
const bc=D.gB();bc.push({id:uid(),message:msg,ts:Date.now()});D.sB(bc);
toast('Broadcast sent to all users.','s');renderContent();
}

document.getElementById('sidebar').classList.toggle('open');
document.getElementById('sb-overlay').classList.toggle('show');
});

/* ===================== TOPBAR BUTTONS ===================== */
document.getElementById('btn-logout').addEventListener('click',()=>{D.cS();location.reload()});

/* ===================== CLOCK ===================== */
function updateClock(){
const el=document.getElementById('sb-time');
if(el)el.textContent=new Date().toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,30000);

/* ===================== INIT ===================== */
if(checkAuth()){
renderNav();renderContent();updateClock();
window.addEventListener('resize',()=>{if(tab==='overview')setTimeout(drawChart,80)});
}
</script>
