<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOWUP — Referral Program</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#050505;--bg2:#0a0a0a;--card:#0e0e0e;--card2:#111;
--border:#161616;--border2:#222;--border3:#2a2a2a;
--fg:#f5f5f5;--fg2:#ccc;--muted:#888;--dim:#555;--dim2:#333;
--accent:#c9a84c;--accent2:#e0c672;--accent3:#a88a30;
--abg:rgba(201,168,76,.06);--abg2:rgba(201,168,76,.1);--abg3:rgba(201,168,76,.16);
--danger:#e74c3c;--success:#2ecc71;--warn:#f39c12;
--gg:linear-gradient(135deg,#c9a84c,#e0c672,#c9a84c);
--gt:linear-gradient(135deg,#c9a84c 0%,#f0dfa0 50%,#c9a84c 100%)
}
html{scroll-behavior:smooth}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden;line-height:1.6}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
a{color:var(--accent);text-decoration:none}
.gold-text{background:var(--gt);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.container{max-width:760px;margin:0 auto;padding:0 20px}

/* NAV */
.topnav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px;border-bottom:1px solid var(--border);background:rgba(5,5,5,.92);backdrop-filter:blur(16px);position:fixed;top:0;left:0;right:0;z-index:200}
.nl{font-size:16px;font-weight:900;letter-spacing:2.5px}.nl span{color:var(--accent)}
.nav-back{padding:8px 16px;font-size:12px;font-weight:600;color:var(--muted);background:none;border:1px solid var(--border);border-radius:9px;cursor:pointer;font-family:'Poppins',sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px}
.nav-back:hover{border-color:var(--accent);color:var(--accent)}
.nav-coins{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--accent);background:var(--abg2);padding:5px 12px;border-radius:8px}
.nav-coins i{font-size:11px}

/* HERO */
.ref-hero{padding:100px 0 40px;text-align:center;position:relative;overflow:hidden}
.ref-hero::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.06),transparent 65%);top:20%;left:50%;transform:translateX(-50%);pointer-events:none}
.ref-hero-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);border:1px solid rgba(201,168,76,.2);padding:6px 18px;border-radius:20px;margin-bottom:20px;background:var(--abg)}
.ref-hero h1{font-size:clamp(28px,6vw,42px);font-weight:900;line-height:1.1;letter-spacing:-1px;margin-bottom:12px}
.ref-hero p{font-size:14px;color:var(--muted);max-width:480px;margin:0 auto;line-height:1.7}

/* LINK CARD */
.link-card{background:var(--card);border:1px solid rgba(201,168,76,.12);border-radius:18px;padding:28px;margin-bottom:24px;position:relative;overflow:hidden}
.link-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gg);opacity:.4}
.link-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;text-align:center}
.link-box{display:flex;gap:8px;margin-bottom:14px}
.link-box input{flex:1;background:#0a0a0a;border:1px solid var(--border);border-radius:11px;padding:13px 16px;color:var(--accent);font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;outline:none;letter-spacing:.2px}
.link-box input::placeholder{color:var(--dim);font-weight:400}
.link-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;padding:12px 22px;border-radius:10px;border:none;cursor:pointer;transition:all .25s;outline:none;white-space:nowrap}
.btn:focus-visible{box-shadow:0 0 0 2px var(--accent)}
.btn-p{background:var(--gg);color:#0a0a0a}.btn-p:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-o{background:none;color:var(--fg2);border:1px solid var(--border2);font-weight:600}.btn-o:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:9px 18px;font-size:12px;border-radius:9px}
.btn-wa{background:#25D366;color:#fff;font-weight:700}.btn-wa:hover{background:#20bd5a;transform:translateY(-1px)}
.btn-ig{background:linear-gradient(135deg,#833AB4,#E1306C,#F77737);color:#fff;font-weight:700}.btn-ig:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-tg{background:#2AABEE;color:#fff;font-weight:700}.btn-tg:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;filter:none!important}

/* PROGRESS RING */
.progress-section{text-align:center;margin-bottom:32px}
.progress-ring-wrap{position:relative;width:160px;height:160px;margin:0 auto 16px}
.progress-ring-svg{width:160px;height:160px;transform:rotate(-90deg)}
.progress-ring-bg{fill:none;stroke:#0a0a0a;stroke-width:8}
.progress-ring-fill{fill:none;stroke:url(#goldGrad);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.progress-ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.progress-ring-num{font-size:36px;font-weight:900;color:var(--accent);line-height:1}
.progress-ring-den{font-size:12px;color:var(--dim);margin-top:2px}
.progress-status{font-size:14px;font-weight:600;margin-bottom:4px}
.progress-status.complete{color:var(--success)}
.progress-status.incomplete{color:var(--fg2)}
.progress-sub{font-size:12px;color:var(--dim)}

/* MILESTONES */
.milestones{margin-bottom:32px}
.milestones h3{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.milestones h3 i{color:var(--accent);font-size:12px}
.milestone-track{display:flex;gap:0;position:relative;margin-bottom:8px}
.milestone-track::before{content:'';position:absolute;top:20px;left:24px;right:24px;height:2px;background:var(--border);z-index:0}
.milestone-node{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;text-align:center}
.milestone-dot{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:8px;transition:all .4s;border:2px solid var(--border);background:var(--card);color:var(--dim)}
.milestone-dot.earned{border-color:var(--accent);background:var(--abg2);color:var(--accent);box-shadow:0 0 16px rgba(201,168,76,.12)}
.milestone-dot.current{border-color:var(--accent2);background:var(--abg3);color:var(--accent2);animation:pulse-dot 2s ease infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 8px rgba(201,168,76,.15)}50%{box-shadow:0 0 20px rgba(201,168,76,.3)}}
.milestone-req{font-size:10px;color:var(--dim);font-weight:600;margin-bottom:2px}
.milestone-reward{font-size:10px;color:var(--muted);font-weight:500;line-height:1.4}
.milestone-node.earned .milestone-req{color:var(--accent)}

/* REWARDS GRID */
.rewards-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:32px}
.reward-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center;transition:all .35s;position:relative;overflow:hidden}
.reward-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.15),transparent);opacity:0;transition:opacity .35s}
.reward-card:hover{border-color:var(--border2);transform:translateY(-2px)}.reward-card:hover::before{opacity:1}
.reward-card.earned{border-color:rgba(201,168,76,.2);background:var(--abg)}
.reward-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;margin:0 auto 10px;background:var(--abg2);color:var(--accent);border:1px solid rgba(201,168,76,.08)}
.reward-card.earned .reward-icon{background:var(--abg3);box-shadow:0 0 16px rgba(201,168,76,.08)}
.reward-card h4{font-size:12px;font-weight:700;margin-bottom:2px}
.reward-card p{font-size:10px;color:var(--dim);line-height:1.4}
.reward-check{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:6px;background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.2);color:var(--success);display:none;align-items:center;justify-content:center;font-size:10px}
.reward-card.earned .reward-check{display:flex}
.reward-lock{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--dim);display:flex;align-items:center;justify-content:center;font-size:9px}
.reward-card.earned .reward-lock{display:none}

/* LEADERBOARD */
.leaderboard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:32px}
.leaderboard h3{font-size:13px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:7px}
.leaderboard h3 i{color:var(--accent);font-size:12px}
.lb-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.02);transition:background .15s}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:rgba(255,255,255,.01);margin:0 -8px;padding:10px 8px;border-radius:8px;border-color:transparent}
.lb-row.me{background:var(--abg);margin:0 -8px;padding:10px 8px;border-radius:8px;border-color:transparent}
.lb-rank{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.lb-rank.gold{background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(201,168,76,.08));color:var(--accent);border:1px solid rgba(201,168,76,.2)}
.lb-rank.silver{background:rgba(180,180,180,.08);color:#aaa;border:1px solid rgba(180,180,180,.15)}
.lb-rank.bronze{background:rgba(180,120,60,.08);color:#b87830;border:1px solid rgba(180,120,60,.15)}
.lb-rank.normal{background:var(--abg);color:var(--dim)}
.lb-avatar{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--accent);background:var(--abg2);flex-shrink:0}
.lb-info{flex:1;min-width:0}.lb-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-name.me-name{color:var(--accent)}
.lb-phone{font-size:10px;color:var(--dim)}
.lb-count{text-align:right}.lb-num{font-size:16px;font-weight:800;color:var(--accent)}.lb-label{font-size:9px;color:var(--dim);font-weight:500}
.lb-empty{text-align:center;padding:30px 0;color:var(--dim);font-size:12px}
.lb-empty i{font-size:24px;display:block;margin-bottom:8px;opacity:.2}

/* HOW IT WORKS */
.how-section{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:32px}
.how-section h3{font-size:13px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:7px;text-align:center;justify-content:center}
.how-section h3 i{color:var(--accent);font-size:12px}
.how-steps{display:flex;flex-direction:column;gap:14px}
.how-step{display:flex;align-items:flex-start;gap:12px}
.how-num{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;background:var(--abg2);color:var(--accent);flex-shrink:0;margin-top:1px}
.how-text{font-size:12px;color:var(--fg2);line-height:1.6}
.how-text strong{color:var(--accent);font-weight:600}

/* FAQ */
.faq-list{display:flex;flex-direction:column;gap:6px;margin-bottom:40px}
.faq-item{background:var(--card);border:1px solid var(--border);border-radius:11px;overflow:hidden;transition:border-color .3s}
.faq-item.open{border-color:var(--border2)}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;font-size:12px;font-weight:600;gap:12px;background:none;border:none;color:var(--fg);width:100%;text-align:left;font-family:'Poppins',sans-serif}
.faq-q i{color:var(--dim);font-size:10px;transition:transform .3s;flex-shrink:0}
.faq-item.open .faq-q i{transform:rotate(180deg);color:var(--accent)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .4s ease}
.faq-a-inner{padding:0 18px 14px;font-size:11px;color:var(--muted);line-height:1.8}

/* NOT LOGGED IN */
.not-logged{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.not-logged-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:40px;max-width:400px;width:100%}
.not-logged-card i{font-size:40px;color:var(--dim);margin-bottom:16px;opacity:.3;display:block}
.not-logged-card h2{font-size:20px;font-weight:800;margin-bottom:6px}
.not-logged-card p{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6}

/* TOAST */
#toast-box{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{padding:11px 16px;border-radius:10px;font-size:12px;font-weight:500;max-width:340px;animation:slideIn .3s ease;display:flex;align-items:center;gap:7px;backdrop-filter:blur(8px)}
.toast.hide{animation:slideOut .3s ease forwards}
.toast-s{background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.25);color:#2ecc71}
.toast-e{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.25);color:#e74c3c}
.toast-i{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);color:var(--accent)}

/* FOOTER */
.ref-footer{border-top:1px solid var(--border);padding:24px 20px;text-align:center;font-size:11px;color:var(--dim)}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(24px)}}
.fi{animation:fadeUp .5s ease both}.f1{animation-delay:.06s}.f2{animation-delay:.12s}.f3{animation-delay:.18s}.f4{animation-delay:.24s}.f5{animation-delay:.3s}

@media(max-width:600px){
.link-actions{flex-direction:column}.link-actions .btn{width:100%}
.rewards-grid{grid-template-columns:1fr}
.ref-hero h1{font-size:26px}
.milestone-req{font-size:9px}.milestone-reward{font-size:9px}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<div id="app"></div>
<div id="toast-box"></div>

<svg width="0" height="0" style="position:absolute;">
<defs>
<linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#c9a84c"/>
<stop offset="50%" stop-color="#e0c672"/>
<stop offset="100%" stop-color="#c9a84c"/>
</linearGradient>
</defs>
</svg>

<script>
/* ===== CONSTANTS ===== */
const REF_TIERS=[
{req:1,coins:20,label:'+20 Glow Coins',icon:'fa-coins'},
{req:3,coins:50,label:'+50 Bonus Coins',icon:'fa-gem'},
{req:5,reward:'mentor',label:'Free Mentor Session',icon:'fa-video'},
{req:10,reward:'elite',label:'Elite Badge + 200 Coins',icon:'fa-trophy'}
];

/* ===== DATA LAYER ===== */
const D={
_g(k){try{return JSON.parse(localStorage.getItem('g_'+k))||null}catch{return null}},
_s(k,v){try{localStorage.setItem('g_'+k,JSON.stringify(v))}catch(e){}},
gU(){return this._g('users')||[]},
gS(){return this._g('sess')},
fP(p){return this.gU().find(u=>u.phone===p)},
cur(){const s=this.gS();return s?this.fP(s.phone):null}
};

/* ===== UTILS ===== */
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
function toast(msg,type='i'){
const b=document.getElementById('toast-box'),ic={s:'fa-circle-check',e:'fa-circle-exclamation',i:'fa-coins'};
const el=document.createElement('div');el.className='toast toast-'+type;
el.innerHTML='<i class="fa-solid '+ic[type]+'"></i><span>'+esc(msg)+'</span>';b.appendChild(el);
setTimeout(()=>{el.classList.add('hide');setTimeout(()=>el.remove(),300)},3200)}

/* ===== RENDER ===== */
function render(){
const u=D.cur();
if(!u){document.getElementById('app').innerHTML=vNotLogged();return}
const users=D.gU();
const myRefC=u.refC||0;
const myRank=[...users].sort((a,b)=>(b.refC||0)-(a.refC||0)).findIndex(x=>x.id===u.id)+1;
const refCode=u.refCode||generateCode(u);
const refLink=location.origin+location.pathname+'?ref='+refCode;
const earned=TIER(myRefC);
const circumference=2*Math.PI*62;
const progress=Math.min(myRefC/3,1);
const offset=circumference-(progress*circumference);
const isIncoming=sessionStorage.getItem('g_incoming_ref');
if(isIncoming)sessionStorage.removeItem('g_incoming_ref');

document.getElementById('app').innerHTML=`
<nav class="topnav">
<button class="nav-back" onclick="location.href='dashboard.html'"><i class="fa-solid fa-arrow-left" style="font-size:11px;"></i> Dashboard</button>
<div class="nl">GLOW<span>UP</span></div>
<div class="nav-coins"><i class="fa-solid fa-coins"></i>${u.coins||0}</div>
</nav>

<section class="ref-hero">
<div class="ref-hero-badge fi"><i class="fa-solid fa-user-group" style="font-size:9px;"></i> Referral Program</div>
<h1 class="fi f1">Invite Friends.<br><span class="gold-text">Earn Rewards.</span></h1>
<p class="fi f2">Share your unique link with friends. When they join GLOWUP, you earn Glow Cash and unlock exclusive rewards.</p>
</section>

<div class="container">

<!-- LINK CARD -->
<div class="link-card fi f2">
<div class="link-label">Your Unique Referral Link</div>
<div class="link-box">
<input type="text" readonly id="ref-link" value="${esc(refLink)}">
<button class="btn btn-p btn-sm" id="copy-btn"><i class="fa-solid fa-copy" style="font-size:11px;"></i> Copy</button>
</div>
<div class="link-actions">
<button class="btn btn-wa btn-sm" id="wa-share" style="flex:1;"><i class="fa-brands fa-whatsapp" style="font-size:14px;"></i> WhatsApp</button>
<button class="btn btn-ig btn-sm" id="ig-share" style="flex:1;"><i class="fa-brands fa-instagram" style="font-size:13px;"></i> Instagram</button>
<button class="btn btn-tg btn-sm" id="tg-share" style="flex:1;"><i class="fa-brands fa-telegram" style="font-size:13px;"></i> Telegram</button>
</div>
</div>

<!-- PROGRESS RING -->
<div class="progress-section fi f3">
<div class="progress-ring-wrap">
<svg class="progress-ring-svg" viewBox="0 0 140 140">
<circle class="progress-ring-bg" cx="70" cy="70" r="62"/>
<circle class="progress-ring-fill" cx="70" cy="70" r="62" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
</svg>
<div class="progress-ring-center">
<div class="progress-ring-num">${myRefC}</div>
<div class="progress-ring-den">/ 3 for free access</div>
</div>
</div>
<div class="progress-status ${myRefC>=3?'complete':'incomplete'}">${myRefC>=3?'<i class="fa-solid fa-check-circle" style="margin-right:4px;"></i> Free Access Unlocked!':'Keep going — '+(3-myRefC)+' more to go'}</div>
<div class="progress-sub">${myRefC>=3?'Your dashboard is unlocked. Share more to earn bonus rewards.':'When 3 friends sign up and pay using your link, your full access unlocks automatically.'}</div>
</div>

<!-- MILESTONE TRACK -->
<div class="milestones fi f3">
<h3><i class="fa-solid fa-route"></i> Your Milestones</h3>
<div class="milestone-track">
 ${REF_TIERS.map((t,i)=>{
const isEarned=myRefC>=t.req;
const isCurrent=!isEarned&&(i===0||myRefC>=REF_TIERS[i-1].req);
return`<div class="milestone-node ${isEarned?'earned':''}">
<div class="milestone-dot ${isEarned?'earned':''} ${isCurrent?'current':''}">
 ${isEarned?'<i class="fa-solid fa-check"></i>':'<span>'+t.req+'</span>'}
</div>
<div class="milestone-req">${t.req} ref${t.req>1?'errals':'erral'}</div>
<div class="milestone-reward">${t.label}</div>
</div>`}).join('')}
</div>
</div>

<!-- REWARDS GRID -->
<div class="rewards-grid fi f4">
 ${REF_TIERS.map(t=>{
const isEarned=myRefC>=t.req;
return`<div class="reward-card ${isEarned?'earned':''}">
<div class="reward-check"><i class="fa-solid fa-check"></i></div>
<div class="reward-lock"><i class="fa-solid fa-lock"></i></div>
<div class="reward-icon"><i class="fa-solid ${t.icon}"></i></div>

function TIER(count){return REF_TIERS.map(t=>({...t,earned:count>=t.req}))}

function generateCode(u){return(u.refCode||'').length>=6?u.refCode:u.id.slice(0,8)}

function buildLeaderboard(users,me,myRank){
const sorted=[...users].filter(u=>(u.refC||0)>0).sort((a,b)=>(b.refC||0)-(a.refC||0)).slice(0,10);
if(!sorted.length)return'<div class="lb-empty"><i class="fa-solid fa-trophy"></i><p>No referrals yet. Be the first!</p></div>';
const top3=sorted.slice(0,3);const rest=sorted.slice(3);
let html='';
top3.forEach((u,i)=>{
const isMe=u.id===me.id;
const ini=u.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const rankClass=i===0?'gold':i===1?'silver':'bronze';
html+=`<div class="lb-row ${isMe?'me':''}"><div class="lb-rank ${rankClass}">${i+1}</div>
<div class="lb-avatar">${ini}</div><div class="lb-info"><div class="lb-name ${isMe?'me-name':''}">${esc(u.name)}${isMe?' (You)':''}</div><div class="lb-phone">${esc(u.phone)}</div></div>
<div class="lb-count"><div class="lb-num">${u.refC||0}</div><div class="lb-label">refs</div></div></div>`});
rest.forEach((u,i)=>{
const isMe=u.id===me.id;
const ini=u.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
html+=`<div class="lb-row ${isMe?'me':''}"><div class="lb-rank normal">${i+4}</div>
<div class="lb-avatar">${ini}</div><div class="lb-info"><div class="lb-name ${isMe?'me-name':''}">${esc(u.name)}${isMe?' (You)':''}</div><div class="lb-phone">${esc(u.phone)}</div></div>
<div class="lb-count"><div class="lb-num">${u.refC||0}</div><div class="lb-label">refs</div></div></div>`});
if(myRank>10&&!sorted.some(u=>u.id===me.id)){
const ini=me.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
html+=`<div style="height:1px;background:var(--border);margin:8px 0;"></div>
<div class="lb-row me"><div class="lb-rank normal">${myRank}</div>
<div class="lb-avatar">${ini}</div><div class="lb-info"><div class="lb-name me-name">${esc(me.name)} (You)</div><div class="lb-phone">${esc(me.phone)}</div></div>
<div class="lb-count"><div class="lb-num">${me.refC||0}</div><div class="lb-label">refs</div></div></div>`}
return html;
}

const shareText="Hey! I'm using GLOWUP — a reward-based system where you earn coins for daily habits and redeem real skincare products. It's only ₹99. Join using my link: "+refLink;

document.getElementById('copy-btn').addEventListener('click',()=>{

});

/* FAQ accordion */
document.querySelectorAll('[data-faq]').forEach(btn=>{
btn.addEventListener('click',function(){
const item=this.closest('.faq-item');const isOpen=item.classList.contains('open');

if(!isOpen){item.classList.add('open');const a=item.querySelector('.faq-a');a.style.maxHeight=a.scrollHeight+'px'}
});
});
}
